<!DOCTYPE html>
<html>

<head>

<title>AI Prediction</title>

<link rel="stylesheet" href="/static/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="dashboard">

<h1>AI Prediction Result</h1>

<div class="prediction-container">

<div class="prediction-card">

<h2>Predicted Value</h2>

<p class="result">{{result}}</p>

<p class="status">AI Model Status: Active</p>

</div>

<div class="prediction-card">

<h2>Prediction Visualization</h2>

<canvas id="predictionChart"></canvas>

</div>

</div>

</div>

<script>

const ctx = document.getElementById('predictionChart')

new Chart(ctx,{
type:'line',
data:{
labels:['1','2','3','4','5','Prediction'],
datasets:[{
label:'Trend',
data:[30000,40000,50000,60000,70000,{{result}}]
}]
}
})

</script>

</body>

</html>
