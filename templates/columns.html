```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Column Analysis</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin:0;
            padding:0;
        }

        .container{
            width:600px;
            margin:80px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
            text-align:center;
        }

        h1{
            color:#333;
        }

        .stats{
            margin-top:30px;
        }

        .card{
            background:#f9fafc;
            padding:15px;
            margin:10px 0;
            border-radius:8px;
            font-size:18px;
        }

        .back-btn{
            margin-top:25px;
            padding:10px 20px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
            text-decoration:none;
        }

        .back-btn:hover{
            background:#0056b3;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Column Analysis</h1>

    <h2>{{ column }}</h2>

    <div class="stats">

        <div class="card">
            <strong>Mean:</strong> {{ mean }}
        </div>

        <div class="card">
            <strong>Median:</strong> {{ median }}
        </div>

        <div class="card">
            <strong>Maximum:</strong> {{ maximum }}
        </div>

        <div class="card">
            <strong>Minimum:</strong> {{ minimum }}
        </div>

    </div>

    <a href="/index" class="back-btn">Back to Dashboard</a>

</div>

</body>
</html>
```
