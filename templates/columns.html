<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Column Analysis</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* Page Layout */
body{
    font-family:'Poppins', sans-serif;
    background:#f4f6fb;
    margin:0;
    padding:40px;
}

/* Page Title */
.title{
    text-align:center;
    margin-bottom:40px;
}

.title h2{
    color:#333;
    font-weight:600;
}

/* Card Container */
.analysis-container{
    max-width:900px;
    margin:auto;
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
    gap:20px;
}

/* Individual Cards */
.stat-card{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
    text-align:center;
    transition:0.3s;
}

/* Hover effect */
.stat-card:hover{
    transform:translateY(-5px);
}

/* Label */
.stat-label{
    font-size:14px;
    color:#777;
    margin-bottom:10px;
}

/* Value */
.stat-value{
    font-size:26px;
    font-weight:600;
    color:#4f6df5;
}

</style>

</head>

<body>

<div class="title">
<h2>Column Analysis: {{ column }}</h2>
</div>

<div class="analysis-container">

<div class="stat-card">
<div class="stat-label">Mean</div>
<div class="stat-value">{{ mean }}</div>
</div>

<div class="stat-card">
<div class="stat-label">Median</div>
<div class="stat-value">{{ median }}</div>
</div>

<div class="stat-card">
<div class="stat-label">Maximum</div>
<div class="stat-value">{{ maximum }}</div>
</div>

<div class="stat-card">
<div class="stat-label">Minimum</div>
<div class="stat-value">{{ minimum }}</div>
</div>

</div>

</body>
</html>
